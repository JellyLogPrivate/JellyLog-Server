spring.application.name=JellyLog

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/jellylog?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

gemini.api.key=dummy

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE:profile,email}

jwt.secret=${JWT_SECRET:local-development-secret-change-me-in-production}
jwt.access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:3600}
jwt.refresh-token-validity-seconds=${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
